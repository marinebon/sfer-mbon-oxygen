project:
  type: website
  pre-render:
  - example_batch/generate_batch_qmds.R
  - cruise_oxygen/generate_batch_qmds.R
  render:
  - index.qmd
  - example_batch/batched_reports/*.qmd
  - example_batch/listing.qmd
  - cruise_oxygen/batched_reports/*.qmd
  - cruise_oxygen/listing.qmd
website:
  title: QuartoBatch Example
  navbar:
    left:
    - href: index.qmd
      text: Home
    - example_batch/listing.qmd
    - cruise_oxygen/listing.qmd
    - href: https://github.com/7yl4r/quartobatch
      text: Source Code on GitHub
format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-fold: true
    message: false
    warning: false

